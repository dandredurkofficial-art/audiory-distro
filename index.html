<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiory Distro - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0b0f19; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        // Dummy Lucide Icons fallback for CDN script
        const Music = () => <span className="inline-block font-bold">🎵</span>;
        const BarChart2 = () => <span className="inline-block">📊</span>;
        const DollarSign = () => <span className="inline-block">💵</span>;
        const Disc = () => <span className="inline-block">💿</span>;
        const Upload = () => <span className="inline-block">📤</span>;
        const LogOut = () => <span className="inline-block">🚪</span>;
        const ChevronRight = () => <span className="inline-block">👉</span>;
        const CheckCircle = () => <span className="inline-block text-emerald-400">✔️</span>;
        const Clock = () => <span className="inline-block text-amber-400">⏳</span>;
        const Menu = () => <span className="inline-block">☰</span>;
        const X = () => <span className="inline-block">✕</span>;

        function AudioryDashboard() {
            const [sidebarOpen, setSidebarOpen] = React.useState(false);

            const stats = [
                { name: 'Total Balance', value: '$1,240.50', icon: DollarSign, change: '+12% this month', color: 'text-emerald-400' },
                { name: 'Total Streams', value: '348.2K', icon: BarChart2, change: '+24% this month', color: 'text-blue-400' },
                { name: 'Active Releases', value: '14', icon: Disc, change: '1 pending review', color: 'text-purple-400' },
            ];

            const recentReleases = [
                { id: 1, title: 'Midnight Drive', type: 'Single', upc: '85974239811', date: 'May 14, 2026', status: 'Live', streams: '45,200' },
                { id: 2, title: 'Lost in Mombasa', type: 'EP (4 Tracks)', upc: '85974239812', date: 'May 02, 2026', status: 'Live', streams: '128,100' },
                { id: 3, title: 'Street Anthem', type: 'Single', upc: 'Pending', date: 'Processing', status: 'In Review', streams: '-' },
            ];

            return (
                <div className="min-h-screen bg-[#0b0f19] text-slate-100 font-sans flex">
                    {/* SIDEBAR */}
                    <div className={`fixed inset-y-0 left-0 z-50 w-64 bg-[#0e1424] border-r border-slate-800 transform ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} transition-transform duration-200 ease-in-out lg:translate-x-0 lg:static lg:inset-auto`}>
                        <div className="h-20 flex items-center justify-between px-6 border-b border-slate-800">
                            <div className="flex items-center space-x-3">
                                <div className="h-9 w-9 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-lg flex items-center justify-center font-bold text-white shadow-lg shadow-blue-500/20">A</div>
                                <span className="text-xl font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">
                                    Audiory <span className="text-blue-400 font-medium text-sm px-2 py-0.5 bg-blue-500/10 rounded-full border border-blue-500/20 ml-1">Distro</span>
                                </span>
                            </div>
                            <button className="lg:hidden text-slate-400 hover:text-white" onClick={() => setSidebarOpen(false)}><X /></button>
                        </div>
                        <nav className="mt-6 px-4 space-y-1">
                            <a href="#" className="flex items-center space-x-3 px-4 py-3 text-sm font-medium rounded-xl bg-blue-600 text-white"><Music /> <span>Dashboard</span></a>
                            <a href="#" className="flex items-center space-x-3 px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-[#161f38] hover:text-white"><Disc /> <span>My Releases</span></a>
                            <a href="#" className="flex items-center space-x-3 px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-[#161f38] hover:text-white"><BarChart2 /> <span>Analytics</span></a>
                            <a href="#" className="flex items-center space-x-3 px-4 py-3 text-sm font-medium rounded-xl text-slate-400 hover:bg-[#161f38] hover:text-white"><DollarSign /> <span>Royalties</span></a>
                        </nav>
                    </div>

                    {/* MAIN CONTENT */}
                    <div className="flex-1 flex flex-col min-w-0 overflow-x-hidden">
                        <header className="h-20 bg-[#0e1424]/50 backdrop-blur-md border-b border-slate-800 flex items-center justify-between px-6 lg:px-10 sticky top-0 z-40">
                            <div className="flex items-center">
                                <button className="text-slate-400 hover:text-white mr-4 lg:hidden" onClick={() => setSidebarOpen(true)}><Menu /></button>
                                <h1 className="text-xl font-semibold text-white hidden md:block">Welcome back, Producer</h1>
                            </div>
                            <div className="flex items-center space-x-4">
                                <button className="flex items-center space-x-2 bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-medium text-sm px-4 py-2.5 rounded-full shadow-lg">
                                    <Upload /> <span>New Release</span>
                                </button>
                            </div>
                        </header>

                        <main className="flex-1 p-6 lg:p-10 space-y-8 max-w-7xl w-full mx-auto">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                                {stats.map((stat, i) => {
                                    const Icon = stat.icon;
                                    return (
                                        <div key={i} className="bg-[#0e1424] border border-slate-800/80 p-6 rounded-2xl flex items-center justify-between">
                                            <div className="space-y-2">
                                                <p className="text-xs font-semibold uppercase tracking-wider text-slate-400">{stat.name}</p>
                                                <p className="text-2xl font-bold text-white">{stat.value}</p>
                                                <p className="text-xs text-slate-500">{stat.change}</p>
                                            </div>
                                            <div className={`p-3 bg-slate-800/50 rounded-xl ${stat.color}`}><Icon /></div>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* TABLE */}
                            <div className="bg-[#0e1424] border border-slate-800 rounded-2xl overflow-hidden">
                                <div className="p-6 border-b border-slate-800"><h3 className="font-bold text-white">Recent Catalog</h3></div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="border-b border-slate-800 text-xs font-semibold text-slate-400 bg-[#0c1120]/50">
                                                <th className="py-4 px-6">Release Title</th>
                                                <th className="py-4 px-6">Type</th>
                                                <th className="py-4 px-6">Release Date</th>
                                                <th className="py-4 px-6">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/60 text-sm">
                                            {recentReleases.map((release) => (
                                                <tr key={release.id} className="hover:bg-[#12192c]/40 text-slate-300">
                                                    <td className="py-4 px-6 font-medium text-white">{release.title}</td>
                                                    <td className="py-4 px-6">{release.type}</td>
                                                    <td className="py-4 px-6">{release.date}</td>
                                                    <td className="py-4 px-6">
                                                        <span className="px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">{release.status}</span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const root = tragedies = riots = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AudioryDashboard />);
    </script>
</body>
</html>
